<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<p id="status">Loading...</p>

<h3>Support Requests</h3>
<div id="requests"></div>

<button onclick="logout()">Logout</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADD6zb-bPiW1zUd3k6luEe2Bz7_n5xPBg",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = "skyvestcapital.ng@gmail.com";

// 🔥 AUTH CHECK
auth.onAuthStateChanged(user => {

  if(!user){
    window.location.href = "index.html";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    document.body.innerHTML = "<h2>Access Denied</h2>";
    return;
  }

  document.getElementById("status").innerText = "Welcome Admin: " + user.email;

  loadRequests();
});

// 🔥 LOAD SUPPORT REQUESTS
function loadRequests(){
  const container = document.getElementById("requests");
  container.innerHTML = "Loading...";

  db.collection("support_requests")
  .get()
  .then(snapshot => {

    if(snapshot.empty){
      container.innerHTML = "<p>No requests found</p>";
      return;
    }

    container.innerHTML = "";

    snapshot.forEach(doc => {
      let data = doc.data();

      container.innerHTML += `
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
          <p><b>User:</b> ${data.userId}</p>
          <p><b>Amount:</b> ₦${data.amount}</p>
          <p><b>Reason:</b> ${data.reason}</p>
          <p><b>Status:</b> ${data.status}</p>
        </div>
      `;
    });

  })
  .catch(err => {
    console.log(err);
    container.innerHTML = "Error loading requests";
  });
}

function logout(){
  auth.signOut().then(()=>{
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
