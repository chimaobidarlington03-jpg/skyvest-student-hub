<!DOCTYPE html>
<html>
<head>
  <title>Skyvest Admin Panel</title>
</head>
<body>

<h2>Skyvest Admin Dashboard</h2>

<div id="requests"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADD6zb-bPiW1zUd3k6luEe2Bz7_n5xPBg",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub",
  storageBucket: "skyvest-student-hub.firebasestorage.app",
  messagingSenderId: "941265501695",
  appId: "1:941265501695:web:6aa43e2e09caacd335bbca"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// your admin email
const adminEmail = "skyvestcapital.ng@gmail.com";

auth.onAuthStateChanged(user => {
  if(user){
    if(user.email.toLowerCase() === adminEmail){
      loadRequests();
    } else {
      alert("Access denied");
      window.location.href = "dashboard.html";
    }
  } else {
    window.location.href = "login.html";
  }
});

async function loadRequests(){
  let container = document.getElementById("requests");
  container.innerHTML = "";

  let snapshot = await db.collection("support_requests").get();

  for(let doc of snapshot.docs){
    let data = doc.data();

    // get user email from users collection
    let userDoc = await db.collection("users").doc(data.userId).get();
    let userEmail = userDoc.exists ? userDoc.data().email : "Unknown";

    container.innerHTML += `
      <div style="border:1px solid #000; padding:10px; margin:10px;">
        <p><b>User:</b> ${userEmail}</p>
        <p><b>Amount:</b> ₦${data.amount}</p>
        <p><b>Reason:</b> ${data.reason}</p>
        <p><b>Status:</b> ${data.status}</p>

        <button onclick="approve('${doc.id}', '${data.userId}', ${data.amount})">Approve</button>
        <button onclick="reject('${doc.id}')">Reject</button>
      </div>
    `;
  }
}

function approve(id, userId, amount){
  let ref = db.collection("users").doc(userId);

  ref.get().then(doc => {
    let newBalance = doc.data().balance + amount;

    ref.update({ balance: newBalance });

    db.collection("support_requests").doc(id).update({
      status: "approved"
    });

    alert("Approved & money sent");
    loadRequests();
  });
}

function reject(id){
  db.collection("support_requests").doc(id).update({
    status: "rejected"
  });

  alert("Request rejected");
  loadRequests();
}
</script>

</body>
</html>
