<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skyvest Login</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- AOS ANIMATION -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  position:relative;
  background:#07131f;
}

/* PARALLAX BACKGROUND */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  background:
  radial-gradient(circle at top left,#00ff9955,transparent 25%),
  radial-gradient(circle at bottom right,#35b24a44,transparent 25%),
  linear-gradient(135deg,#07131f,#0b1d2d,#07131f);
  z-index:-5;
}

/* FLOATING LIGHTS */
.lights{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:-4;
}

.light{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(5px);
  animation:float 18s infinite linear;
}

.light:nth-child(1){
  width:200px;
  height:200px;
  left:5%;
  top:80%;
}

.light:nth-child(2){
  width:120px;
  height:120px;
  left:70%;
  top:85%;
  animation-duration:25s;
}

.light:nth-child(3){
  width:180px;
  height:180px;
  left:40%;
  top:90%;
  animation-duration:20s;
}

.light:nth-child(4){
  width:90px;
  height:90px;
  left:85%;
  top:75%;
  animation-duration:15s;
}

@keyframes float{
  0%{
    transform:translateY(0) rotate(0deg);
  }
  100%{
    transform:translateY(-130vh) rotate(360deg);
  }
}

/* GLASS CONTAINER */
.container{
  position:relative;
  width:950px;
  max-width:95%;
  height:580px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:30px;
  overflow:hidden;
  backdrop-filter:blur(18px);
  box-shadow:
  0 20px 60px rgba(0,0,0,0.4),
  0 0 30px rgba(53,178,74,0.15);
  transform-style:preserve-3d;
  animation:appear 1.2s ease;
}

@keyframes appear{
  from{
    opacity:0;
    transform:translateY(40px) scale(0.9);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

/* FORM BOX */
.form-box{
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:50px;
  transition:0.8s ease-in-out;
}

.login-box{
  left:0;
}

.register-box{
  left:100%;
}

.container.active .login-box{
  left:-100%;
}

.container.active .register-box{
  left:50%;
}

h2{
  margin-bottom:20px;
  color:#ffffff;
  font-size:38px;
  font-weight:700;
  text-shadow:0 0 15px rgba(53,178,74,0.4);
}

.subtitle{
  color:#d7ffe1;
  margin-bottom:25px;
  text-align:center;
  font-size:14px;
  line-height:1.7;
}

/* INPUTS */
.input-group{
  width:100%;
  position:relative;
}

input{
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:16px;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.12);
  transition:0.3s;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

input:focus{
  transform:scale(1.02);
  border:1px solid #35b24a;
  box-shadow:0 0 20px rgba(53,178,74,0.4);
}

input::placeholder{
  color:#d7ffe1;
}

/* BUTTON */
button{
  margin-top:18px;
  padding:15px 40px;
  border:none;
  border-radius:40px;
  cursor:pointer;
  background:linear-gradient(135deg,#35b24a,#4dff88);
  color:white;
  font-weight:600;
  font-size:15px;
  transition:0.35s;
  box-shadow:0 12px 25px rgba(53,178,74,0.35);
}

button:hover{
  transform:translateY(-5px) scale(1.03);
  box-shadow:0 18px 40px rgba(53,178,74,0.45);
}

.message{
  margin-top:14px;
  font-size:14px;
  color:#ff7d7d;
}

/* OVERLAY */
.overlay{
  position:absolute;
  top:0;
  left:50%;
  width:50%;
  height:100%;
  background:
  linear-gradient(135deg,
  rgba(53,178,74,0.95),
  rgba(34,94,59,0.92));
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:50px;
  transition:0.8s ease-in-out;
  overflow:hidden;
}

.overlay::before{
  content:'';
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  top:-120px;
  right:-100px;
}

.overlay::after{
  content:'';
  position:absolute;
  width:250px;
  height:250px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  bottom:-100px;
  left:-80px;
}

.container.active .overlay{
  left:0;
}

.overlay h2{
  color:white;
  font-size:46px;
  z-index:2;
}

.overlay p{
  margin-top:15px;
  line-height:1.8;
  z-index:2;
  color:#f2fff5;
}

.switch-btn{
  background:transparent;
  border:2px solid white;
  margin-top:25px;
  z-index:2;
}

.switch-btn:hover{
  background:white;
  color:#35b24a;
}

/* GLOWING LINE */
.line{
  position:absolute;
  width:100%;
  height:2px;
  background:linear-gradient(to right,transparent,#4dff88,transparent);
  top:0;
  animation:moveLine 4s linear infinite;
}

@keyframes moveLine{
  0%{
    transform:translateX(-100%);
  }
  100%{
    transform:translateX(100%);
  }
}

/* MOBILE */
@media(max-width:768px){

  .container{
    height:auto;
    min-height:700px;
  }

  .form-box{
    width:100%;
    position:relative;
    left:0 !important;
  }

  .overlay{
    display:none;
  }

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="lights">
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
</div>

<div class="container" id="container" data-aos="zoom-in">

  <div class="line"></div>

  <!-- LOGIN -->
  <div class="form-box login-box">

    <h2>Login</h2>

    <p class="subtitle">
      Access your immersive financial dashboard and continue your Skyvest journey.
    </p>

    <div class="input-group">
      <input type="email" id="loginEmail" placeholder="Email">
    </div>

    <div class="input-group">
      <input type="password" id="loginPass" placeholder="Password">
    </div>

    <button onclick="login()">Login</button>

    <p class="message" id="loginMsg"></p>

  </div>

  <!-- REGISTER -->
  <div class="form-box register-box">

    <h2>Create Account</h2>

    <p class="subtitle">
      Join the next generation investment experience with Skyvest.
    </p>

    <div class="input-group">
      <input type="text" id="regUser" placeholder="Username">
    </div>

    <div class="input-group">
      <input type="email" id="regEmail" placeholder="Email">
    </div>

    <div class="input-group">
      <input type="password" id="regPass" placeholder="Password">
    </div>

    <button onclick="register()">Register</button>

    <p class="message" id="regMsg"></p>

  </div>

  <!-- OVERLAY -->
  <div class="overlay">

    <h2>Skyvest</h2>

    <p>
      Experience futuristic banking visuals, smooth 3D transitions,
      glassmorphism effects, and immersive animations.
    </p>

    <button class="switch-btn" onclick="toggle()">Switch</button>

  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

/* AOS */
AOS.init({
  duration:1200
});

/* PARALLAX EFFECT */
document.addEventListener("mousemove",(e)=>{

  let x = (window.innerWidth - e.pageX * 2) / 90;
  let y = (window.innerHeight - e.pageY * 2) / 90;

  document.querySelector(".container").style.transform =
  `rotateY(${x}deg) rotateX(${y}deg)`;

});

/* RESET POSITION */
document.addEventListener("mouseleave",()=>{

  document.querySelector(".container").style.transform =
  `rotateY(0deg) rotateX(0deg)`;

});

const firebaseConfig = {
  apiKey: "AIzaSyADD6zb-bPiW1zUd3k6luEe2Bz7_n5xPBg",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
.catch(err => console.log(err));

const db = firebase.firestore();

const container = document.getElementById("container");

function toggle(){
  container.classList.toggle("active");
}

/* REGISTER */
function register(){

  let username = document.getElementById("regUser").value;
  let email = document.getElementById("regEmail").value;
  let pass = document.getElementById("regPass").value;

  auth.createUserWithEmailAndPassword(email, pass)

  .then(userCred => {

    db.collection("users").doc(userCred.user.uid).set({
      email: email,
      username: username,
      balance: 0,
      savings: 0
    });

    document.getElementById("regMsg").style.color = "#4dff88";
    document.getElementById("regMsg").innerText = "Registered!";

  })

  .catch(err=>{

    document.getElementById("regMsg").innerText = err.message;

  });
}

/* LOGIN */
function login(){

  let email = document.getElementById("loginEmail").value;
  let pass = document.getElementById("loginPass").value;

  auth.signInWithEmailAndPassword(email, pass)

  .then(()=>{

    window.location.href = "dashboard.html";

  })

  .catch(err=>{

    document.getElementById("loginMsg").innerText = err.message;

  });
}

</script>

</body>
</html>
