<!DOCTYPE html>
<html>
<head>
  <title>Skyvest Student Hub</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .header {
      background: #16a34a;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      background: #16a34a;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">Skyvest Student Hub</div>

<div class="container">

  <div class="card">
    <h3>Wallet Balance</h3>
    <p id="balance">₦1000</p>
  </div>

  <div class="card">
    <h3>Savings</h3>
    <p id="savings">₦500</p>
  </div>

  <div class="card">
    <button onclick="earn()">Earn ₦100</button>
    <button onclick="save()">Save ₦100</button>
    <button onclick="bonus()">Weekly Bonus</button>
  </div>

</div>

<script>
let balance = 1000;
let savings = 500;

function updateUI() {
  document.getElementById("balance").innerText = "₦" + balance;
  document.getElementById("savings").innerText = "₦" + savings;
}

function earn() {
  balance += 100;
  updateUI();
}

function save() {
  if(balance >= 100){
    balance -= 100;
    savings += 100;
    updateUI();
  }
}

function bonus() {
  let bonus = savings * 0.02;
  balance += bonus;
  updateUI();
}

</script>

</body>
</html>
