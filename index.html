<!DOCTYPE html>
<html>
<head>
  <title>Login - Skyvest</title>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<br><br>

<!-- 🔐 Forgot Password -->
<button onclick="resetPassword()">Forgot Password?</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADD6zb-bPiW1zUd3k6luEe2Bz7_n5xPBg",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub",
  storageBucket: "skyvest-student-hub.firebasestorage.app",
  messagingSenderId: "941265501695",
  appId: "1:941265501695:web:6aa43e2e09caacd335bbca"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(email === "" || password === ""){
    alert("Fill all fields");
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
  .then(() => {
    alert("Login successful");
    window.location.href = "dashboard.html";
  })
  .catch(err => {
    alert("Login failed: " + err.message);
  });
}

function resetPassword(){
  let email = document.getElementById("email").value;

  if(!email){
    alert("Enter your email first");
    return;
  }

  auth.sendPasswordResetEmail(email)
  .then(() => {
    alert("Password reset email sent");
  })
  .catch(err => {
    alert("Error: " + err.message);
  });
}
</script>

</body>
</html>
