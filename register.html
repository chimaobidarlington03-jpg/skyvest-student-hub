<!DOCTYPE html>
<html>
<head>
  <title>Register - Skyvest</title>
</head>
<body>

<h2>Register</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADD6zb-bPiW1zUd3k6luEe2Bz7_n5xPBg",
  authDomain: "skyvest-student-hub.firebaseapp.com",
  projectId: "skyvest-student-hub",
  storageBucket: "skyvest-student-hub.firebasestorage.app",
  messagingSenderId: "941265501695",
  appId: "1:941265501695:web:6aa43e2e09caacd335bbca"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function register(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .then((userCredential) => {
    let user = userCredential.user;

    // Save user in database
    db.collection("users").doc(user.uid).set({
      email: email,
      balance: 0,
      savings: 0
    });

    alert("Account created successfully");
    window.location.href = "login.html";
  })
  .catch(err => alert(err.message));
}
</script>

</body>
</html>
